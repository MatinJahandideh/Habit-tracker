<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="هبیت ترکر" />
  <meta name="theme-color" content="#0D0F14" />
  <title>🎯 هبیت ترکر</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; overscroll-behavior: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; }
    button, input { font-family: inherit; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const { BarChart, Bar, LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell } = Recharts;

const ACCENT="#7C6AFA", GREEN="#34D399", YELLOW="#FBBF24", RED="#F87171";
const EMOJIS=["🏃","💪","📚","🧘","💧","🥗","😴","🎯","✍️","🎸","🧠","💻","🌿","🚴","🏊","🎨","🧹","📱","❤️","⭐","☕","🍎","🧴","🚶","🧩","🎵","🏋️","🛌","🧪","🤸"];
const CATEGORIES=["سلامتی","ورزش","یادگیری","ذهنی","تغذیه","اجتماعی","کار"];
const CAT_COLORS={"سلامتی":"#34D399","ورزش":"#F87171","یادگیری":"#FBBF24","ذهنی":"#A78BFA","تغذیه":"#6EE7B7","اجتماعی":"#F9A8D4","کار":"#7C6AFA"};
const PALETTE=["#7C6AFA","#34D399","#F87171","#FBBF24","#60A5FA","#F9A8D4","#A78BFA","#6EE7B7","#FB923C","#E879F9"];
const DEF=[
  {id:1,name:"ورزش روزانه",emoji:"🏃",category:"ورزش",target:1,unit:"بار",color:"#F87171"},
  {id:2,name:"آب کافی",emoji:"💧",category:"سلامتی",target:8,unit:"لیوان",color:"#34D399"},
  {id:3,name:"مطالعه",emoji:"📚",category:"یادگیری",target:30,unit:"دقیقه",color:"#FBBF24"},
  {id:4,name:"مدیتیشن",emoji:"🧘",category:"ذهنی",target:10,unit:"دقیقه",color:"#A78BFA"},
];
const KEY="habit_v3";
const load=()=>{try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):null;}catch{return null;}};
const persist=(d)=>{try{localStorage.setItem(KEY,JSON.stringify(d));}catch{}};
const today=()=>new Date().toISOString().split("T")[0];
function getLast(n,unit){const a=[];for(let i=n-1;i>=0;i--){const d=new Date();unit==="day"?d.setDate(d.getDate()-i):d.setMonth(d.getMonth()-i);a.push(d.toISOString().split("T")[0]);}return a;}
function dlabel(s,m){const d=new Date(s);if(m==="weekly")return["ش","ی","د","س","چ","پ","ج"][d.getDay()];if(m==="monthly")return d.getDate();return["فر","ار","خر","تی","مر","شه","مه","آب","آذ","دی","به","اس"][d.getMonth()];}
const tv=(dk)=>({bg:dk?"#0D0F14":"#F1F5F9",surface:dk?"#161A23":"#FFF",card:dk?"#1C2130":"#F8FAFC",border:dk?"#252B3B":"#E2E8F0",text:dk?"#E8EAF0":"#1E293B",muted:dk?"#6B7280":"#94A3B8",mutedL:dk?"#9CA3AF":"#64748B"});
const btn=(t,x={})=>({padding:"8px 14px",borderRadius:10,border:`1px solid ${t.border}`,background:t.card,color:t.text,cursor:"pointer",fontSize:14,...x});
const inp=(t)=>({width:"100%",padding:"10px 12px",borderRadius:10,border:`1px solid ${t.border}`,background:t.card,color:t.text,fontSize:14,outline:"none"});

function App(){
  const s=load();
  const [habits,setHabits]=useState(s?.habits||DEF);
  const [logs,setLogs]=useState(s?.logs||{});
  const [view,setView]=useState("today");
  const [cm,setCm]=useState("weekly");
  const [modal,setModal]=useState(false);
  const [edit,setEdit]=useState(null);
  const [sel,setSel]=useState(today());
  const [dark,setDark]=useState(s?.dark!==false);
  const t=tv(dark);
  useEffect(()=>{persist({habits,logs,dark});},[habits,logs,dark]);
  const getLog=(d,id)=>logs?.[d]?.[id]||0;
  const setLog=(d,id,v)=>setLogs(p=>({...p,[d]:{...(p[d]||{}),[id]:Math.max(0,v)}}));
  function toggle(id){const h=habits.find(h=>h.id===id);if(!h)return;const c=getLog(sel,id);setLog(sel,id,h.target===1?(c>=1?0:1):(c>=h.target?0:c+1));}
  function score(d){if(!habits.length)return 0;return Math.round(habits.filter(h=>getLog(d,h.id)>=h.target).length/habits.length*100);}
  function chartData(){
    const dates=cm==="weekly"?getLast(7,"day"):cm==="monthly"?getLast(30,"day"):getLast(12,"month");
    if(cm==="yearly")return dates.map(d=>{const mo=d.slice(0,7);const dd=getLast(30,"day").filter(x=>x.startsWith(mo));const avg=dd.reduce((a,x)=>a+score(x),0)/(dd.length||1);return{label:dlabel(d,"yearly"),score:Math.round(avg)};});
    return dates.map(d=>({label:dlabel(d,cm),score:score(d),date:d}));
  }
  function saveHabit(h){if(h.id)setHabits(p=>p.map(x=>x.id===h.id?h:x));else setHabits(p=>[...p,{...h,id:Date.now()}]);setModal(false);setEdit(null);}
  const sc=score(sel),scc=sc>=80?GREEN:sc>=50?YELLOW:RED,done=habits.filter(h=>getLog(sel,h.id)>=h.target).length;
  const cd=chartData();
  const streak=(()=>{let s=0,d=new Date();while(true){if(score(d.toISOString().split("T")[0])>=50)s++;else break;d.setDate(d.getDate()-1);}return s;})();

  return(
    <div style={{minHeight:"100vh",background:t.bg,color:t.text,transition:"all 0.3s"}}>
      {/* Header */}
      <div style={{background:t.surface,borderBottom:`1px solid ${t.border}`,padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50}}>
        <div><div style={{fontSize:19,fontWeight:700,color:ACCENT}}>🎯 هبیت ترکر</div><div style={{fontSize:11,color:t.muted}}>مسیر عادت‌های روزانه</div></div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setDark(d=>!d)} style={btn(t,{fontSize:18,padding:"7px 11px"})}>{dark?"☀️":"🌙"}</button>
          <button onClick={()=>{setEdit(null);setModal(true);}} style={btn(t,{background:ACCENT,color:"#fff",fontWeight:700,border:"none"})}>+ عادت</button>
        </div>
      </div>
      {/* Nav */}
      <div style={{display:"flex",gap:4,padding:"10px 14px",background:t.surface,borderBottom:`1px solid ${t.border}`}}>
        {[["today","📅 امروز"],["chart","📊 نمودار"],["manage","⚙️ مدیریت"]].map(([v,l])=>(
          <button key={v} onClick={()=>setView(v)} style={{padding:"8px 16px",borderRadius:20,border:"none",cursor:"pointer",fontSize:13,background:view===v?ACCENT:"transparent",color:view===v?"#fff":t.mutedL,fontWeight:view===v?600:400,transition:"all 0.2s"}}>{l}</button>
        ))}
      </div>
      <div style={{padding:14,maxWidth:600,margin:"0 auto",paddingBottom:36}}>

        {/* TODAY */}
        {view==="today"&&(<>
          <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center"}}>
            <input type="date" value={sel} onChange={e=>setSel(e.target.value)} style={{...inp(t),flex:1}}/>
            <button onClick={()=>setSel(today())} style={btn(t,{fontSize:12,padding:"8px 12px"})}>امروز</button>
          </div>
          <div style={{background:t.card,borderRadius:20,padding:18,border:`1px solid ${t.border}`,marginBottom:14,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div style={{fontSize:12,color:t.muted,marginBottom:4}}>پیشرفت روز</div>
              <div style={{fontSize:44,fontWeight:800,color:scc,lineHeight:1}}>{sc}%</div>
              <div style={{fontSize:12,color:t.muted,marginTop:4}}>{done} از {habits.length} عادت کامل شد</div>
            </div>
            <svg viewBox="0 0 80 80" width="80" height="80" style={{transform:"rotate(-90deg)",flexShrink:0}}>
              <circle cx="40" cy="40" r="32" fill="none" stroke={t.border} strokeWidth="8"/>
              <circle cx="40" cy="40" r="32" fill="none" stroke={scc} strokeWidth="8" strokeDasharray={2*Math.PI*32} strokeDashoffset={2*Math.PI*32*(1-sc/100)} strokeLinecap="round" style={{transition:"stroke-dashoffset 0.8s ease"}}/>
            </svg>
          </div>
          {habits.length===0?(
            <div style={{textAlign:"center",padding:48,color:t.muted}}>
              <div style={{fontSize:48,marginBottom:10}}>🌱</div>
              <div style={{marginBottom:14}}>هنوز عادتی اضافه نکردی</div>
              <button onClick={()=>setModal(true)} style={btn(t,{background:ACCENT,color:"#fff",border:"none",padding:"12px 24px",borderRadius:12,fontWeight:600})}>اولین عادت رو اضافه کن</button>
            </div>
          ):habits.map(h=>{
            const val=getLog(sel,h.id),isDone=val>=h.target,pct=Math.min(100,val/h.target*100);
            return(
              <div key={h.id} style={{background:t.card,borderRadius:16,padding:"14px 14px",marginBottom:10,border:`1px solid ${isDone?h.color+"55":t.border}`,transition:"all 0.2s"}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:46,height:46,borderRadius:13,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,background:isDone?h.color+"28":t.border+"44",border:`2px solid ${isDone?h.color:"transparent"}`,transition:"all 0.3s",flexShrink:0}}>{h.emoji}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                      <span style={{fontWeight:600,fontSize:15}}>{h.name}</span>
                      <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,flexShrink:0,background:CAT_COLORS[h.category]+"28",color:CAT_COLORS[h.category]}}>{h.category}</span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{flex:1,height:6,borderRadius:3,background:t.border,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:h.color,borderRadius:3,transition:"width 0.4s ease"}}/></div>
                      <span style={{fontSize:12,color:t.muted,whiteSpace:"nowrap"}}>{val}/{h.target} {h.unit}</span>
                    </div>
                  </div>
                </div>
                <div style={{display:"flex",gap:8,marginTop:12}}>
                  {h.target===1?(
                    <button onClick={()=>toggle(h.id)} style={{flex:1,padding:10,borderRadius:10,border:"none",cursor:"pointer",fontWeight:600,fontSize:14,background:isDone?h.color:t.border,color:isDone?"#fff":t.mutedL,transition:"all 0.2s"}}>{isDone?"✅ انجام شد":"انجام شد؟"}</button>
                  ):(<>
                    <button onClick={()=>setLog(sel,h.id,val-1)} style={{width:42,height:42,borderRadius:10,border:`1px solid ${t.border}`,background:t.card,color:t.text,cursor:"pointer",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>−</button>
                    <button onClick={()=>toggle(h.id)} style={{flex:1,padding:10,borderRadius:10,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,background:isDone?h.color:ACCENT+"28",color:isDone?"#fff":ACCENT,transition:"all 0.2s"}}>{isDone?"✅ کامل!":"+۱ "+h.unit}</button>
                    <button onClick={()=>setLog(sel,h.id,val+1)} style={{width:42,height:42,borderRadius:10,border:`1px solid ${t.border}`,background:t.card,color:t.text,cursor:"pointer",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>+</button>
                  </>)}
                </div>
              </div>
            );
          })}
        </>)}

        {/* CHART */}
        {view==="chart"&&(<>
          <div style={{display:"flex",gap:6,marginBottom:14}}>
            {[["weekly","هفتگی"],["monthly","ماهانه"],["yearly","سالانه"]].map(([m,l])=>(
              <button key={m} onClick={()=>setCm(m)} style={{padding:"8px 16px",borderRadius:20,border:`1px solid ${t.border}`,cursor:"pointer",fontSize:13,background:cm===m?ACCENT:t.card,color:cm===m?"#fff":t.mutedL,fontWeight:cm===m?600:400,transition:"all 0.2s"}}>{l}</button>
            ))}
          </div>
          {(()=>{const scores=cd.map(d=>d.score),avg=Math.round(scores.reduce((a,b)=>a+b,0)/(scores.length||1)),best=Math.max(...scores,0);return(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
              {[["📈","میانگین",avg+"%"],["🏆","بهترین",best+"%"],["🔥","استریک",streak+" روز"]].map(([e,l,v])=>(
                <div key={l} style={{background:t.card,borderRadius:14,padding:"12px 6px",textAlign:"center",border:`1px solid ${t.border}`}}>
                  <div style={{fontSize:24}}>{e}</div>
                  <div style={{fontSize:18,fontWeight:700,color:"#A597FC"}}>{v}</div>
                  <div style={{fontSize:11,color:t.muted}}>{l}</div>
                </div>
              ))}
            </div>
          );})()}
          <div style={{background:t.card,borderRadius:20,padding:"18px 6px",border:`1px solid ${t.border}`,marginBottom:12}}>
            <div style={{fontSize:12,color:t.muted,padding:"0 10px",marginBottom:10}}>درصد تکمیل عادت‌ها</div>
            <ResponsiveContainer width="100%" height={190}>
              <BarChart data={cd} barSize={cm==="monthly"?7:18}>
                <CartesianGrid strokeDasharray="3 3" stroke={t.border} vertical={false}/>
                <XAxis dataKey="label" tick={{fill:t.muted,fontSize:11}} axisLine={false} tickLine={false}/>
                <YAxis domain={[0,100]} tick={{fill:t.muted,fontSize:11}} axisLine={false} tickLine={false} tickFormatter={v=>v+"%"}/>
                <Tooltip contentStyle={{background:t.surface,border:`1px solid ${t.border}`,borderRadius:10,color:t.text}} formatter={v=>[v+"%","پیشرفت"]} labelStyle={{color:t.muted}}/>
                <Bar dataKey="score" radius={[6,6,0,0]}>{cd.map((e,i)=><Cell key={i} fill={e.score>=80?GREEN:e.score>=50?YELLOW:RED}/>)}</Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
          <div style={{background:t.card,borderRadius:20,padding:"18px 6px",border:`1px solid ${t.border}`,marginBottom:14}}>
            <div style={{fontSize:12,color:t.muted,padding:"0 10px",marginBottom:10}}>روند پیشرفت</div>
            <ResponsiveContainer width="100%" height={160}>
              <LineChart data={cd}>
                <CartesianGrid strokeDasharray="3 3" stroke={t.border} vertical={false}/>
                <XAxis dataKey="label" tick={{fill:t.muted,fontSize:11}} axisLine={false} tickLine={false}/>
                <YAxis domain={[0,100]} tick={{fill:t.muted,fontSize:11}} axisLine={false} tickLine={false} tickFormatter={v=>v+"%"}/>
                <Tooltip contentStyle={{background:t.surface,border:`1px solid ${t.border}`,borderRadius:10,color:t.text}} formatter={v=>[v+"%","پیشرفت"]}/>
                <Line type="monotone" dataKey="score" stroke={ACCENT} strokeWidth={2.5} dot={{fill:ACCENT,r:4}} activeDot={{r:6}}/>
              </LineChart>
            </ResponsiveContainer>
          </div>
          <div style={{fontSize:13,fontWeight:600,marginBottom:10,color:t.mutedL}}>عملکرد هر عادت</div>
          {habits.map(h=>{
            const dates=cm==="weekly"?getLast(7,"day"):cm==="monthly"?getLast(30,"day"):getLast(12,"month");
            const dc=dates.filter(d=>getLog(d,h.id)>=h.target).length,pct=Math.round(dc/(dates.length||1)*100);
            return(
              <div key={h.id} style={{background:t.card,borderRadius:12,padding:"12px 14px",marginBottom:8,border:`1px solid ${t.border}`,display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:22}}>{h.emoji}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:13,fontWeight:600}}>{h.name}</span><span style={{fontSize:13,fontWeight:700,color:pct>=70?GREEN:pct>=40?YELLOW:RED}}>{pct}%</span></div>
                  <div style={{height:5,borderRadius:3,background:t.border,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:h.color,borderRadius:3,transition:"width 0.6s ease"}}/></div>
                </div>
              </div>
            );
          })}
        </>)}

        {/* MANAGE */}
        {view==="manage"&&(<>
          <button onClick={()=>{setEdit(null);setModal(true);}} style={{width:"100%",padding:14,borderRadius:14,border:`2px dashed ${ACCENT}`,background:"transparent",color:ACCENT,cursor:"pointer",fontSize:15,fontWeight:600,marginBottom:14}}>+ اضافه کردن عادت جدید</button>
          {habits.length===0&&<div style={{textAlign:"center",padding:48,color:t.muted}}><div style={{fontSize:44}}>📋</div><div style={{marginTop:8}}>هیچ عادتی وجود نداره</div></div>}
          {habits.map(h=>(
            <div key={h.id} style={{background:t.card,borderRadius:16,padding:"14px 14px",marginBottom:10,border:`1px solid ${t.border}`,display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:46,height:46,borderRadius:13,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,background:h.color+"28",border:`2px solid ${h.color}`,flexShrink:0}}>{h.emoji}</div>
              <div style={{flex:1,minWidth:0}}><div style={{fontWeight:600,fontSize:15}}>{h.name}</div><div style={{fontSize:12,color:t.muted}}>هدف: {h.target} {h.unit} · {h.category}</div></div>
              <div style={{display:"flex",gap:6,flexShrink:0}}>
                <button onClick={()=>{setEdit(h);setModal(true);}} style={btn(t,{padding:"8px 12px",fontSize:14})}>✏️</button>
                <button onClick={()=>{if(window.confirm("این عادت حذف بشه؟"))setHabits(p=>p.filter(x=>x.id!==h.id));}} style={btn(t,{padding:"8px 12px",fontSize:14,background:RED+"22",color:RED,border:`1px solid ${RED}44`})}>🗑️</button>
              </div>
            </div>
          ))}
        </>)}
      </div>

      {modal&&<Modal habit={edit} t={t} onSave={saveHabit} onClose={()=>{setModal(false);setEdit(null);}}/>}
    </div>
  );
}

function Modal({habit,t,onSave,onClose}){
  const [form,setForm]=useState(habit||{name:"",emoji:"🎯",category:"سلامتی",target:1,unit:"بار",color:ACCENT});
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  return(
    <div style={{position:"fixed",inset:0,background:"#00000085",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:t.surface,borderRadius:"22px 22px 0 0",padding:"22px 16px",width:"100%",maxWidth:600,border:`1px solid ${t.border}`,maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <span style={{fontSize:17,fontWeight:700}}>{habit?"ویرایش عادت":"عادت جدید"}</span>
          <button onClick={onClose} style={btn(t,{padding:"6px 10px",fontSize:18})}>✕</button>
        </div>
        <div style={{fontSize:12,color:t.muted,marginBottom:6}}>آیکون</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
          {EMOJIS.map(e=><button key={e} onClick={()=>set("emoji",e)} style={{width:40,height:40,borderRadius:10,cursor:"pointer",fontSize:20,border:`2px solid ${form.emoji===e?ACCENT:t.border}`,background:form.emoji===e?ACCENT+"22":"transparent"}}>{e}</button>)}
        </div>
        <div style={{fontSize:12,color:t.muted,marginBottom:6}}>نام عادت</div>
        <input value={form.name} onChange={e=>set("name",e.target.value)} placeholder="مثلاً: ورزش صبحگاهی" style={{...inp(t),marginBottom:12}}/>
        <div style={{fontSize:12,color:t.muted,marginBottom:6}}>دسته‌بندی</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
          {CATEGORIES.map(c=><button key={c} onClick={()=>set("category",c)} style={{padding:"6px 12px",borderRadius:20,cursor:"pointer",fontSize:12,fontWeight:form.category===c?600:400,border:`1px solid ${form.category===c?CAT_COLORS[c]:t.border}`,background:form.category===c?CAT_COLORS[c]:t.card,color:form.category===c?"#fff":t.mutedL}}>{c}</button>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          <div><div style={{fontSize:12,color:t.muted,marginBottom:6}}>هدف روزانه</div><input type="number" min="1" value={form.target} onChange={e=>set("target",Math.max(1,+e.target.value||1))} style={inp(t)}/></div>
          <div><div style={{fontSize:12,color:t.muted,marginBottom:6}}>واحد</div><input value={form.unit} onChange={e=>set("unit",e.target.value)} placeholder="بار، دقیقه..." style={inp(t)}/></div>
        </div>
        <div style={{fontSize:12,color:t.muted,marginBottom:6}}>رنگ</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:20}}>
          {PALETTE.map(c=><button key={c} onClick={()=>set("color",c)} style={{width:34,height:34,borderRadius:"50%",background:c,border:"none",cursor:"pointer",outline:form.color===c?`3px solid ${c}`:"none",outlineOffset:2}}/>)}
        </div>
        <button onClick={()=>form.name.trim()&&onSave(form)} style={{width:"100%",padding:14,borderRadius:14,border:"none",background:form.name.trim()?ACCENT:t.border,color:form.name.trim()?"#fff":t.muted,cursor:form.name.trim()?"pointer":"not-allowed",fontSize:15,fontWeight:700}}>
          {habit?"ذخیره تغییرات ✓":"اضافه کردن عادت ✓"}
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
